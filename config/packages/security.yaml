security:
  providers:
    users:
      entity:
        class: 'App\Entity\User'
        property: email

  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

  access_control:
    - { path: ^/directory, roles: [ROLE_DEPARTMENTS_VIEW, ROLE_GLOBAL_ADMIN] }
    - { path: ^/photorequests, roles: [ROLE_PHOTO_VIEW, ROLE_GLOBAL_ADMIN] }
    - { path: ^/emergency, roles: [ROLE_EMERGENCY_EDIT, ROLE_GLOBAL_ADMIN] }
    - { path: ^/crimelog, roles: [ROLE_CRIMELOG_USER, ROLE_GLOBAL_ADMIN] }
    - { path: ^/programs, roles: [ROLE_PROGRAMS_VIEW, ROLE_GLOBAL_ADMIN] }
    - { path: ^/map, roles: [ROLE_MAP_VIEW, ROLE_GLOBAL_ADMIN] }
    - { path: ^/redirects, roles: [ROLE_REDIRECT_USER, ROLE_GLOBAL_ADMIN] }
    - { path: ^/register, role: ROLE_GLOBAL_ADMIN }
    - { path: ^/resetting, role: ROLE_GLOBAL_ADMIN }
    - { path: ^/admin, role: ROLE_GLOBAL_ADMIN }
    - { path: ^/applinks, role: ROLE_USER }
    - { path: ^/profile, role: ROLE_USER }
    - { path: ^/$, role: ROLE_USER }
    # EXTERNAL API - Routes that must be publicly accessible!
    - { path: ^/api/external, role: PUBLIC_ACCESS }

  role_hierarchy:
    # Global
    ROLE_GLOBAL_ADMIN: ROLE_USER
    ROLE_GLOBAL_ADMIN_SUPER: ROLE_GLOBAL_ADMIN
    # Map Application
    ROLE_MAP_VIEW: ROLE_USER
    ROLE_MAP_CREATE: ROLE_MAP_VIEW
    ROLE_MAP_EDIT: ROLE_MAP_CREATE
    ROLE_MAP_DELETE: ROLE_MAP_EDIT
    ROLE_MAP_IMAGE_UPLOAD: [ROLE_MAP_VIEW, ROLE_MAP_EDIT]
    ROLE_MAP_ADMIN: [ROLE_MAP_DELETE, ROLE_MAP_IMAGE_UPLOAD]
    # Redirect Application
    ROLE_REDIRECT_USER: ROLE_USER
    ROLE_REDIRECT_ADMIN: ROLE_REDIRECT_USER
    # Catalog Programs
    ROLE_PROGRAMS_VIEW: ROLE_USER
    ROLE_PROGRAMS_CREATE: ROLE_PROGRAMS_VIEW
    ROLE_PROGRAMS_EDIT: ROLE_PROGRAMS_CREATE
    ROLE_PROGRAMS_DELETE: ROLE_PROGRAMS_EDIT
    ROLE_PROGRAMS_ADMIN: ROLE_PROGRAMS_DELETE
    # Crime Log
    ROLE_CRIMELOG_USER: ROLE_USER
    ROLE_CRIMELOG_ADMIN: ROLE_CRIMELOG_USER
    # Department Directory
    ROLE_DEPARTMENTS_VIEW: ROLE_USER
    ROLE_DEPARTMENTS_CREATE: ROLE_DEPARTMENTS_VIEW
    ROLE_DEPARTMENTS_EDIT: ROLE_DEPARTMENTS_CREATE
    ROLE_DEPARTMENTS_DELETE: ROLE_DEPARTMENTS_EDIT
    ROLE_DEPARTMENTS_ADMIN: ROLE_DEPARTMENTS_DELETE
    # Photo Request
    ROLE_PHOTO_VIEW: ROLE_USER
    ROLE_PHOTO_PHOTOG: ROLE_PHOTO_VIEW
    ROLE_PHOTO_CREATE: ROLE_PHOTO_VIEW
    ROLE_PHOTO_EDIT: ROLE_PHOTO_CREATE
    ROLE_PHOTO_DELETE: ROLE_PHOTO_EDIT
    ROLE_PHOTO_ADMIN: ROLE_PHOTO_DELETE
    # Emergency
    ROLE_EMERGENCY_EDIT: ROLE_USER
    ROLE_EMERGENCY_ADMIN: ROLE_EMERGENCY_EDIT

# Local development (Docker) - form login with UserChecker
when@dev:
  security:
    firewalls:
      dev:
        pattern: ^/(_(profiler|wdt)|css|images|js)/
        security: false
      main:
        pattern: ^/
        user_checker: App\Security\UserChecker
        lazy: true
        form_login:
          provider: users
          login_path: app_login
          check_path: app_login
        logout:
          path: /logout

# Staging server - LDAP auth
when@staging:
  security:
    firewalls:
      dev:
        pattern: ^/(_(profiler|wdt)|css|images|js)/
        security: false
      main:
        lazy: true
        provider: users
        form_login_ldap:
          login_path: app_login
          check_path: app_login
          service: Symfony\Component\Ldap\Ldap
          dn_string: "cn={user_identifier},cn=users,dc=ad,dc=emich,dc=edu"
        logout:
          path: /logout

# Production server - LDAP auth
when@prod:
  security:
    firewalls:
      dev:
        pattern: ^/(_(profiler|wdt)|css|images|js)/
        security: false
      main:
        lazy: true
        provider: users
        form_login_ldap:
          login_path: app_login
          check_path: app_login
          service: Symfony\Component\Ldap\Ldap
          dn_string: "cn={user_identifier},cn=users,dc=ad,dc=emich,dc=edu"
        logout:
          path: /logout

# Test environment - form login without UserChecker (for PHPUnit)
when@test:
  security:
    firewalls:
      main:
        lazy: true
        form_login:
          provider: users
          login_path: app_login
          check_path: app_login
        logout:
          path: /logout
